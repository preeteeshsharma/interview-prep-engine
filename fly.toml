app = "interview-prep-engine"
primary_region = "sin"

[build]
dockerfile = "Dockerfile"

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = false  # keep alive for APScheduler
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
path = "/health"
timeout = "5s"

[env]
PORT = "8000"

[[vm]]
size = "shared-cpu-1x"
memory = "256mb"
